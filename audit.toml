[advisories]
# RUSTSEC-2023-0071: rsa Marvin Attack — no upstream patch available.
# rsa is pulled into the lockfile via sqlx-mysql (sqlx resolves all database
# drivers into the lockfile regardless of enabled features). The MySQL driver
# and rsa are NEVER compiled — only the postgres feature is enabled.
# Remove this entry once rsa publishes a patched version.
ignore = ["RUSTSEC-2023-0071"]
